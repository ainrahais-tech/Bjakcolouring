<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bijak Edukids - Aplikasi Pembelajaran Interaktif</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'Comic Neue', cursive, sans-serif;
            background-color: #FEF3C7; /* Latar belakang kuning lembut */
        }
        .butang-timbul {
            transition: all 0.1s ease;
        }
        .butang-timbul:active {
            transform: translateY(4px);
            border-bottom-width: 2px;
        }
        .kad-animasi {
            transition: transform 0.3s ease;
        }
        .kad-animasi:hover {
            transform: scale(1.05) rotate(1deg);
        }
    </style>
</head>
<body class="h-screen flex flex-col justify-between overflow-x-hidden select-none">

    <header class="bg-white shadow-md p-4 flex justify-between items-center rounded-b-3xl border-b-4 border-amber-400">
        <div class="flex items-center space-x-2 cursor-pointer" onclick="tukarSkrin('menu-utama')">
            <span class="text-3xl animate-bounce">🎒</span>
            <h1 class="text-2xl md:text-3xl font-bold tracking-wide">
                <span class="text-red-500">Bi</span><span class="text-blue-500">jak</span> 
                <span class="text-green-500">Edu</span><span class="text-purple-500">kids</span>
            </h1>
        </div>

        <div class="flex items-center space-x-2">
            <button id="btn-lang" onclick="tukarBahasa()" class="butang-timbul bg-indigo-500 text-white font-bold py-2 px-4 rounded-full text-sm shadow-md border-b-4 border-indigo-700 font-bold cursor-pointer">
                🌐 EN
            </button>
            <button onclick="tukarSkrin('menu-utama')" class="butang-timbul bg-green-500 text-white p-2.5 rounded-full shadow-md border-b-4 border-green-700 cursor-pointer">
                <i class="fa-solid fa-house text-lg"></i>
            </button>
        </div>
    </header>

    <main class="flex-grow p-4 md:p-6 flex items-center justify-center max-w-4xl mx-auto w-full">
        
        <div id="menu-utama" class="w-full text-center space-y-6">
            <h2 id="txt-selamat" class="text-2xl md:text-4xl font-bold text-slate-700">👋 Selamat Datang, Jom Belajar!</h2>
            
            <div class="grid grid-cols-2 gap-4 md:gap-6">
                <div onclick="tukarSkrin('modul-abc')" class="kad-animasi bg-rose-400 text-white p-6 rounded-2xl shadow-xl border-b-8 border-rose-600 cursor-pointer flex flex-col items-center justify-center space-y-2">
                    <span class="text-5xl md:text-6xl">🔤</span>
                    <span class="text-xl md:text-2xl font-bold penterjemahan" data-ms="Belajar ABC" data-en="Learn ABC">Belajar ABC</span>
                </div>
                
                <div onclick="tukarSkrin('modul-123')" class="kad-animasi bg-sky-400 text-white p-6 rounded-2xl shadow-xl border-b-8 border-sky-600 cursor-pointer flex flex-col items-center justify-center space-y-2">
                    <span class="text-5xl md:text-6xl">🔢</span>
                    <span class="text-xl md:text-2xl font-bold penterjemahan" data-ms="Kira 123" data-en="Count 123">Kira 123</span>
                </div>

                <div onclick="tukarSkrin('modul-warna')" class="kad-animasi bg-emerald-400 text-white p-6 rounded-2xl shadow-xl border-b-8 border-emerald-600 cursor-pointer flex flex-col items-center justify-center space-y-2">
                    <span class="text-5xl md:text-6xl">🎨</span>
                    <span class="text-xl md:text-2xl font-bold penterjemahan" data-ms="Kenal Warna" data-en="Learn Colors">Kenal Warna</span>
                </div>

                <div onclick="mulaKuiz()" class="kad-animasi bg-violet-400 text-white p-6 rounded-2xl shadow-xl border-b-8 border-violet-600 cursor-pointer flex flex-col items-center justify-center space-y-2">
                    <span class="text-5xl md:text-6xl">🎮</span>
                    <span class="text-xl md:text-2xl font-bold penterjemahan" data-ms="Kuiz Bijak" data-en="Smart Quiz">Kuiz Bijak</span>
                </div>
            </div>
        </div>

        <div id="modul-abc" class="hidden w-full text-center space-y-6">
            <h2 class="text-3xl font-bold text-rose-600 penterjemahan" data-ms="Mari Belajar Alfabet" data-en="Let's Learn Alphabet">Mari Belajar Alfabet</h2>
            
            <div class="bg-white p-6 rounded-3xl shadow-xl max-w-xs mx-auto border-4 border-rose-300">
                <span id="abc-huruf" class="text-8xl font-bold text-rose-500 block">A</span>
                <span id="abc-emoji" class="text-6xl block my-2">🍎</span>
                <span id="abc-perkataan" class="text-3xl font-bold text-slate-600 block">Epal</span>
            </div>

            <div class="flex justify-center space-x-4">
                <button onclick="navigasiABC(-1)" class="butang-timbul bg-rose-500 text-white px-6 py-3 rounded-full text-xl shadow-md border-b-4 border-rose-700 cursor-pointer"><i class="fa-solid fa-arrow-left"></i></button>
                <button onclick="sebutPerkataanABC()" class="butang-timbul bg-yellow-400 text-slate-700 px-6 py-3 rounded-full text-xl shadow-md border-b-4 border-yellow-600 cursor-pointer"><i class="fa-solid fa-volume-high"></i> Bunyi</button>
                <button onclick="navigasiABC(1)" class="butang-timbul bg-rose-500 text-white px-6 py-3 rounded-full text-xl shadow-md border-b-4 border-rose-700 cursor-pointer"><i class="fa-solid fa-arrow-right"></i></button>
            </div>
        </div>

        <div id="modul-123" class="hidden w-full text-center space-y-6">
            <h2 class="text-3xl font-bold text-sky-600 penterjemahan" data-ms="Mari Mengira" data-en="Let's Count">Mari Mengira</h2>
            
            <div class="bg-white p-6 rounded-3xl shadow-xl max-w-sm mx-auto border-4 border-sky-300 space-y-4">
                <span id="num-paparan" class="text-8xl font-bold text-sky-500 block">1</span>
                <div id="num-objek" class="text-4xl flex justify-center flex-wrap gap-2 min-h-[50px] tracking-wide">
                    🍓
                </div>
            </div>

            <div class="flex justify-center space-x-4">
                <button onclick="navigasi123(-1)" class="butang-timbul bg-sky-500 text-white px-6 py-3 rounded-full text-xl shadow-md border-b-4 border-sky-700 cursor-pointer"><i class="fa-solid fa-arrow-left"></i></button>
                <button onclick="sebutNombor()" class="butang-timbul bg-yellow-400 text-slate-700 px-6 py-3 rounded-full text-xl shadow-md border-b-4 border-yellow-600 cursor-pointer"><i class="fa-solid fa-volume-high"></i> Bunyi</button>
                <button onclick="navigasi123(1)" class="butang-timbul bg-sky-500 text-white px-6 py-3 rounded-full text-xl shadow-md border-b-4 border-sky-700 cursor-pointer"><i class="fa-solid fa-arrow-right"></i></button>
            </div>
        </div>

        <div id="modul-warna" class="hidden w-full text-center space-y-6">
            <h2 class="text-3xl font-bold text-emerald-600 penterjemahan" data-ms="Kenali Warna" data-en="Discover Colors">Kenali Warna</h2>
            
            <div id="kotak-warna" class="w-44 h-44 rounded-full shadow-2xl mx-auto border-8 border-white bg-red-500 duration-300"></div>
            <h3 id="nama-warna" class="text-3xl font-bold text-slate-700">Merah</h3>

            <div class="grid grid-cols-3 gap-4 max-w-xs mx-auto">
                <button onclick="tukarWarna('#EF4444', 'Merah', 'Red')" class="w-14 h-14 bg-red-500 rounded-full border-4 border-white shadow-md mx-auto cursor-pointer transform hover:scale-110 transition-transform"></button>
                <button onclick="tukarWarna('#3B82F6', 'Biru', 'Blue')" class="w-14 h-14 bg-blue-500 rounded-full border-4 border-white shadow-md mx-auto cursor-pointer transform hover:scale-110 transition-transform"></button>
                <button onclick="tukarWarna('#10B981', 'Hijau', 'Green')" class="w-14 h-14 bg-emerald-500 rounded-full border-4 border-white shadow-md mx-auto cursor-pointer transform hover:scale-110 transition-transform"></button>
                <button onclick="tukarWarna('#FBBF24', 'Kuning', 'Yellow')" class="w-14 h-14 bg-amber-400 rounded-full border-4 border-white shadow-md mx-auto cursor-pointer transform hover:scale-110 transition-transform"></button>
                <button onclick="tukarWarna('#8B5CF6', 'Ungu', 'Purple')" class="w-14 h-14 bg-purple-500 rounded-full border-4 border-white shadow-md mx-auto cursor-pointer transform hover:scale-110 transition-transform"></button>
                <button onclick="tukarWarna('#EC4899', 'Merah Jambu', 'Pink')" class="w-14 h-14 bg-pink-500 rounded-full border-4 border-white shadow-md mx-auto cursor-pointer transform hover:scale-110 transition-transform"></button>
            </div>
        </div>

        <div id="modul-kuiz" class="hidden w-full text-center space-y-4">
            <div class="flex justify-between items-center max-w-md mx-auto bg-white/60 p-2 rounded-full px-4 shadow-sm">
                <span id="kuiz-markah" class="text-lg font-bold text-amber-700">⭐ Markah: 0</span>
                <span id="kuiz-bilangan" class="text-lg font-bold text-slate-600">Soalan 1/3</span>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-xl max-w-md mx-auto border-4 border-violet-300 space-y-4">
                <h3 id="kuiz-soalan" class="text-2xl font-bold text-slate-700">Soalan Bermula...</h3>
                <div id="kuiz-visual" class="text-7xl py-2">❓</div>
                
                <div id="kuiz-pilihan" class="grid grid-cols-2 gap-4">
                    </div>
            </div>

            <div id="kuiz-maklumbalas" class="text-2xl font-bold min-h-[40px] tracking-wide"></div>
        </div>

    </main>

    <footer class="bg-amber-100 p-2 text-center text-xs text-amber-700 border-t border-amber-200">
        &copy; 2026 Bijak Edukids — Aplikasi Pembelajaran Selamat & Bebas Ralat.
    </footer>

    <script>
        let bahasaSemasa = 'ms'; // Pilihan awal: Bahasa Melayu
        let indeksABC = 0;
        let indeks123 = 1;
        let indeksSoalan = 0;
        let markahSemasa = 0;

        // Data Pembelajaran ABC beserta Emoji & Perkataan
        const datasetABC = {
            ms: [
                { huruf: 'A', perkataan: 'Ayam', emoji: '🐔' },
                { huruf: 'B', perkataan: 'Bola', emoji: '⚽' },
                { huruf: 'C', perkataan: 'Cawan', emoji: '🥛' },
                { huruf: 'D', perkataan: 'Daun', emoji: '🍃' },
                { huruf: 'E', perkataan: 'Epal', emoji: '🍎' }
            ],
            en: [
                { huruf: 'A', perkataan: 'Apple', emoji: '🍎' },
                { huruf: 'B', perkataan: 'Ball', emoji: '⚽' },
                { huruf: 'C', perkataan: 'Cat', emoji: '🐱' },
                { huruf: 'D', perkataan: 'Dog', emoji: '🐶' },
                { huruf: 'E', perkataan: 'Elephant', emoji: '🐘' }
            ]
        };

        // Data Bank Soalan Kuiz
        const bankSoalan = {
            ms: [
                { soalan: "Mana satu huruf 'B'?", pilihan: ["A", "B", "C", "D"], jawapan: "B", visual: "❓" },
                { soalan: "Kira bilangan strawberi ini: 🍓🍓🍓", pilihan: ["2", "3", "4", "5"], jawapan: "3", visual: "🍓🍓🍓" },
                { soalan: "Apakah warna bagi pisang 🍌?", pilihan: ["Merah", "Biru", "Kuning", "Hijau"], jawapan: "Kuning", visual: "🍌" }
            ],
            en: [
                { soalan: "Which one is the letter 'B'?", pilihan: ["A", "B", "C", "D"], jawapan: "B", visual: "❓" },
                { soalan: "Count these strawberries: 🍓🍓🍓", pilihan: ["2", "3", "4", "5"], jawapan: "3", visual: "🍓🍓🍓" },
                { soalan: "What color is a banana 🍌?", pilihan: ["Red", "Blue", "Yellow", "Green"], jawapan: "Yellow", visual: "🍌" }
            ]
        };

        // Fungsi Penukar Skrin (Navigasi Utama)
        function tukarSkrin(idSkrin) {
            const skrinSemua = ['menu-utama', 'modul-abc', 'modul-123', 'modul-warna', 'modul-kuiz'];
            skrinSemua.forEach(skrin => {
                document.getElementById(skrin).classList.add('hidden');
            });
            document.getElementById(idSkrin).classList.remove('hidden');

            // Set semula kandungan skrin apabila dibuka
            if (idSkrin === 'modul-abc') kemaskiniABC();
            if (idSkrin === 'modul-123') kemaskini123();
        }

        // Fungsi Tukar Bahasa Dinamik
        function tukarBahasa() {
            bahasaSemasa = bahasaSemasa === 'ms' ? 'en' : 'ms';
            document.getElementById('btn-lang').innerText = bahasaSemasa === 'ms' ? '🌐 EN' : '🌐 BM';
            
            // Kemaskini Teks Laman Utama
            document.getElementById('txt-selamat').innerText = bahasaSemasa === 'ms' ? '👋 Selamat Datang, Jom Belajar!' : '👋 Welcome, Let\'s Learn!';
            
            // Kemaskini elemen-elemen teks dwi-bahasa yang mempunyai kelas 'penterjemahan'
            document.querySelectorAll('.penterjemahan').forEach(elemen => {
                elemen.innerText = elemen.getAttribute(`data-${bahasaSemasa}`);
            });

            // Kemaskini modul yang sedang aktif
            kemaskiniABC();
            if (bahasaSemasa === 'en') {
                tukarWarna('#EF4444', 'Red', 'Red');
            } else {
                tukarWarna('#EF4444', 'Merah', 'Red');
            }
        }

        // --- LOGIK MODUL ABC ---
        function kemaskiniABC() {
            let data = datasetABC[bahasaSemasa][indeksABC];
            document.getElementById('abc-huruf').innerText = data.huruf;
            document.getElementById('abc-emoji').innerText = data.emoji;
            document.getElementById('abc-perkataan').innerText = data.perkataan;
        }

        function navigasiABC(arah) {
            indeksABC += arah;
            if (indeksABC < 0) indeksABC = datasetABC[bahasaSemasa].length - 1;
            if (indeksABC >= datasetABC[bahasaSemasa].length) indeksABC = 0;
            kemaskiniABC();
            sebutPerkataanABC();
        }

        function sebutPerkataanABC() {
            let data = datasetABC[bahasaSemasa][indeksABC];
            bunyiSuara(`${data.huruf}... ${data.perkataan}`);
        }

        // --- LOGIK MODUL 123 ---
        function kemaskini123() {
            document.getElementById('num-paparan').innerText = indeks123;
            let bekasObjek = document.getElementById('num-objek');
            bekasObjek.innerHTML = '';
            for (let i = 0; i < indeks123; i++) {
                bekasObjek.innerHTML += '🍓';
            }
        }

        function navigasi123(arah) {
            indeks123 += arah;
            if (indeks123 < 1) indeks123 = 10;
            if (indeks123 > 10) indeks123 = 1;
            kemaskini123();
            sebutNombor();
        }

        function sebutNombor() {
            bunyiSuara(indeks123.toString());
        }

        // --- LOGIK MODUL WARNA ---
        function tukarWarna(kodHex, namaBM, namaEN) {
            document.getElementById('kotak-warna').style.backgroundColor = kodHex;
            let paparanNama = bahasaSemasa === 'ms' ? namaBM : namaEN;
            document.getElementById('nama-warna').innerText = paparanNama;
            bunyiSuara(paparanNama);
        }

        // --- LOGIK MODUL KUIZ BIJAK ---
        function mulaKuiz() {
            indeksSoalan = 0;
            markahSemasa = 0;
            tukarSkrin('modul-kuiz');
            paparSoalanKuiz();
        }

        function paparSoalanKuiz() {
            let dataKuiz = bankSoalan[bahasaSemasa][indeksSoalan];
            
            document.getElementById('kuiz-markah').innerText = bahasaSemasa === 'ms' ? `⭐ Markah: ${markahSemasa}` : `⭐ Score: ${markahSemasa}`;
            document.getElementById('kuiz-bilangan').innerText = bahasaSemasa === 'ms' ? `Soalan ${indeksSoalan + 1}/3` : `Question ${indeksSoalan + 1}/3`;
            document.getElementById('kuiz-soalan').innerText = dataKuiz.soalan;
            document.getElementById('kuiz-visual').innerText = dataKuiz.visual;
            document.getElementById('kuiz-maklumbalas').innerText = '';

            let bekasPilihan = document.getElementById('kuiz-pilihan');
            bekasPilihan.innerHTML = '';

            dataKuiz.pilihan.forEach(opsi => {
                let butang = document.createElement('button');
                butang.className = "bg-amber-400 hover:bg-amber-500 text-slate-800 font-bold p-4 rounded-2xl text-2xl shadow-md border-b-4 border-amber-600 butang-timbul cursor-pointer";
                butang.innerText = opsi;
                butang.onclick = () => semakJawapanKuiz(opsi, dataKuiz.jawapan);
                bekasPilihan.appendChild(butang);
            });
        }

        function semakJawapanKuiz(pilihanKanakKanak, jawapanBetul) {
            let maklumbalas = document.getElementById('kuiz-maklumbalas');
            
            if (pilihanKanakKanak === jawapanBetul) {
                markahSemasa += 10;
                maklumbalas.innerText = bahasaSemasa === 'ms' ? "🎉 Betul! Bijak!" : "🎉 Correct! Smart!";
                maklumbalas.className = "text-2xl font-bold text-green-600 animate-bounce";
                bunyiSuara(bahasaSemasa === 'ms' ? "Betul" : "Correct");
            } else {
                maklumbalas.innerText = bahasaSemasa === 'ms' ? "Cuba Lagi! 💪" : "Try Again! 💪";
                maklumbalas.className = "text-2xl font-bold text-red-500 animate-bounce";
                bunyiSuara(bahasaSemasa === 'ms' ? "Cuba lagi" : "Try again");
            }

            // Tunggu sebentar sebelum ke soalan seterusnya
            setTimeout(() => {
                indeksSoalan++;
                if (indeksSoalan < bankSoalan[bahasaSemasa].length) {
                    paparSoalanKuiz();
                } else {
                    let mesejTamat = bahasaSemasa === 'ms' ? 
                        `Hebat! 🎉 Anda berjaya menamatkan kuiz! Markah penuh: ${markahSemasa}` : 
                        `Great Job! 🎉 You completed the quiz! Final Score: ${markahSemasa}`;
                    alert(mesejTamat);
                    tukarSkrin('menu-utama');
                }
            }, 1500);
        }

        // --- SISTEM SUARA ELEKTRONIK (TEXT TO SPEECH) ---
        function bunyiSuara(teks) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); // Hentikan suara lama jika bertindih
                let sebutan = new SpeechSynthesisUtterance(teks);
                // Menentukan pelayar suara mengikut kesesuaian bahasa
                sebutan.lang = bahasaSemasa === 'ms' ? 'id-ID' : 'en-US'; 
                sebutan.rate = 0.75; // Memperlahankan kelajuan suara sedikit supaya kanak-kanak mudah faham
                window.speechSynthesis.speak(sebutan);
            }
        }
    </script>
</body>
</html>
